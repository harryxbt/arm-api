<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARMAGEDDON — Clipper Portal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  /* Login */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; flex-direction: column; gap: 16px;
  }
  .login-screen h2 { color: #ff3a2f; font-size: 24px; letter-spacing: 6px; margin-bottom: 8px; }
  .login-screen .subtitle { color: #555; font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; }
  .login-screen input {
    background: #141414; border: 1px solid #2a2a2a; color: #e0e0e0;
    padding: 12px 16px; width: 320px; font-family: inherit; font-size: 14px;
    border-radius: 4px; outline: none;
  }
  .login-screen input:focus { border-color: #ff3a2f; }
  .login-screen button {
    background: #ff3a2f; color: #fff; border: none; padding: 12px 32px;
    font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
    border-radius: 4px; letter-spacing: 2px;
  }
  .login-screen button:hover { background: #e0322a; }
  .login-screen .error { color: #ff3a2f; font-size: 12px; min-height: 18px; }

  /* Header */
  .header {
    padding: 20px 32px;
    border-bottom: 1px solid #1a1a1a;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 18px; font-weight: 800; color: #ff3a2f; letter-spacing: 4px; }
  .header .user-info { font-size: 13px; color: #666; display: flex; align-items: center; gap: 16px; }
  .header .user-info span { color: #ccc; }
  .header .logout-btn {
    background: none; border: 1px solid #2a2a2a; color: #888; padding: 6px 14px;
    font-family: inherit; font-size: 11px; cursor: pointer; border-radius: 3px;
    letter-spacing: 1px;
  }
  .header .logout-btn:hover { border-color: #ff3a2f; color: #ff3a2f; }

  /* Portal */
  .portal { display: none; }
  .portal.active { display: block; }

  .container { max-width: 900px; margin: 0 auto; padding: 32px; }

  /* Account group */
  .account-group { margin-bottom: 40px; }
  .account-group-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid #1a1a1a;
  }
  .platform-badge {
    background: #1a1a1a; padding: 4px 10px; border-radius: 3px;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .platform-badge.tiktok { color: #ff004f; }
  .platform-badge.youtube { color: #ff0000; }
  .platform-badge.instagram { color: #e1306c; }
  .platform-badge.twitter { color: #1da1f2; }
  .account-handle { font-size: 14px; color: #ccc; font-weight: 700; }

  /* Assignment card */
  .assignment-card {
    background: #111; border: 1px solid #1a1a1a; border-radius: 6px;
    padding: 20px; margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .assignment-card:hover { border-color: #2a2a2a; }
  .assignment-card.posted { opacity: 0.6; }
  .assignment-status {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px;
    border-radius: 3px; margin-bottom: 12px;
  }
  .assignment-status.assigned { background: #1a1a00; color: #fbbf24; }
  .assignment-status.posted { background: #001a00; color: #22c55e; }

  .caption-block, .hashtags-block {
    margin-bottom: 12px;
  }
  .field-label {
    font-size: 10px; color: #555; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .field-value {
    font-size: 13px; color: #ccc; line-height: 1.5;
    background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 4px;
    padding: 10px 12px; position: relative; cursor: pointer;
  }
  .field-value:hover { border-color: #2a2a2a; }
  .field-value .copy-hint {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 10px; color: #444; pointer-events: none;
  }
  .field-value.copied .copy-hint { color: #22c55e; }

  .assignment-actions {
    display: flex; gap: 8px; align-items: center; margin-top: 14px; flex-wrap: wrap;
  }
  .btn {
    background: #ff3a2f; color: #fff; border: none; padding: 8px 18px;
    font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    border-radius: 4px; letter-spacing: 1px;
  }
  .btn:hover { background: #e0322a; }
  .btn-secondary {
    background: transparent; border: 1px solid #2a2a2a; color: #888;
    padding: 8px 18px; font-family: inherit; font-size: 12px; cursor: pointer;
    border-radius: 4px; letter-spacing: 1px;
  }
  .btn-secondary:hover { border-color: #444; color: #ccc; }
  .btn-success { background: #22c55e; }
  .btn-success:hover { background: #16a34a; }

  .submit-row {
    display: flex; gap: 8px; align-items: center; margin-top: 10px; width: 100%;
  }
  .submit-row input {
    flex: 1; background: #0a0a0a; border: 1px solid #2a2a2a; color: #e0e0e0;
    padding: 8px 12px; font-family: inherit; font-size: 12px; border-radius: 4px; outline: none;
  }
  .submit-row input:focus { border-color: #ff3a2f; }

  .posted-link {
    color: #22c55e; font-size: 12px; text-decoration: none;
  }
  .posted-link:hover { text-decoration: underline; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: #444; font-size: 14px;
  }

  /* Video preview modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal-video {
    max-width: 90vw; max-height: 80vh; border-radius: 8px;
    background: #000;
  }
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <h2>ARMAGEDDON</h2>
  <div class="subtitle">CLIPPER PORTAL</div>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <div class="error" id="loginError"></div>
  <button onclick="login()">LOGIN</button>
</div>

<!-- Portal -->
<div class="portal" id="portal">
  <div class="header">
    <h1>ARMAGEDDON</h1>
    <div class="user-info">
      <span id="clipperName"></span>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </div>
  <div class="container">
    <div id="assignmentsContainer"></div>
  </div>
</div>

<!-- Video preview modal -->
<div class="modal-overlay" id="videoModal">
  <video class="modal-video" id="modalVideo" controls></video>
</div>

<script>
let clipperToken = null;
let clipperName = '';

// --- Auth ---
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';

  if (!email || !password) { errorEl.textContent = 'Enter email and password'; return; }

  try {
    const resp = await fetch('/auth/clipper/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    if (!resp.ok) {
      const data = await resp.json();
      errorEl.textContent = data.detail || 'Login failed';
      return;
    }
    const data = await resp.json();
    clipperToken = data.access_token;
    clipperName = data.name;
    showPortal();
  } catch(e) {
    errorEl.textContent = 'Connection error';
  }
}

function logout() {
  clipperToken = null;
  clipperName = '';
  document.getElementById('portal').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
}

function showPortal() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('portal').classList.add('active');
  document.getElementById('clipperName').textContent = clipperName;
  loadAssignments();
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (clipperToken) headers['Authorization'] = `Bearer ${clipperToken}`;
  return fetch(path, { ...opts, headers });
}

// --- Assignments ---
async function loadAssignments() {
  const container = document.getElementById('assignmentsContainer');
  container.innerHTML = '<p style="color:#555;padding:20px 0;">Loading...</p>';

  try {
    const resp = await api('/clipper/assignments');
    if (!resp.ok) {
      if (resp.status === 401) { logout(); return; }
      container.innerHTML = '<p style="color:#ff3a2f;">Failed to load assignments.</p>';
      return;
    }
    const data = await resp.json();
    const assignments = data.assignments || [];

    if (assignments.length === 0) {
      container.innerHTML = '<div class="empty-state">No assignments yet. Check back soon.</div>';
      return;
    }

    // Group by account
    const groups = {};
    for (const a of assignments) {
      const key = `${a.platform}|${a.handle}|${a.account_id}`;
      if (!groups[key]) groups[key] = { platform: a.platform, handle: a.handle, items: [] };
      groups[key].items.push(a);
    }

    let html = '';
    for (const g of Object.values(groups)) {
      html += `
        <div class="account-group">
          <div class="account-group-header">
            <div class="platform-badge ${g.platform}">${g.platform}</div>
            <div class="account-handle">@${g.handle}</div>
          </div>
          ${g.items.map(a => renderAssignment(a)).join('')}
        </div>
      `;
    }
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<p style="color:#ff3a2f;">Connection error.</p>';
  }
}

function renderAssignment(a) {
  const isPosted = a.status === 'posted';
  return `
    <div class="assignment-card ${isPosted ? 'posted' : ''}" id="card-${a.id}">
      <div class="assignment-status ${a.status}">${a.status.toUpperCase()}</div>

      ${a.caption ? `
        <div class="caption-block">
          <div class="field-label">CAPTION</div>
          <div class="field-value" onclick="copyText(this, ${JSON.stringify(a.caption)})">
            ${escapeHtml(a.caption)}
            <span class="copy-hint">CLICK TO COPY</span>
          </div>
        </div>
      ` : ''}

      ${a.hashtags ? `
        <div class="hashtags-block">
          <div class="field-label">HASHTAGS</div>
          <div class="field-value" onclick="copyText(this, ${JSON.stringify(a.hashtags)})">
            ${escapeHtml(a.hashtags)}
            <span class="copy-hint">CLICK TO COPY</span>
          </div>
        </div>
      ` : ''}

      <div class="assignment-actions">
        ${a.download_url ? `
          <button class="btn-secondary" onclick="previewVideo('${a.download_url}')">WATCH</button>
          <a href="${a.download_url}" download class="btn" style="text-decoration:none;">DOWNLOAD</a>
        ` : '<span style="color:#555;font-size:11px;">No video available</span>'}

        ${isPosted && a.post_url ? `
          <a href="${a.post_url}" target="_blank" class="posted-link">VIEW POST &rarr;</a>
        ` : ''}
      </div>

      ${!isPosted ? `
        <div class="submit-row" id="submit-${a.id}">
          <input type="text" id="url-${a.id}" placeholder="Paste the post URL after uploading...">
          <button class="btn btn-success" onclick="submitLink('${a.id}')">SUBMIT</button>
        </div>
      ` : ''}
    </div>
  `;
}

// --- Actions ---
function copyText(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    const hint = el.querySelector('.copy-hint');
    if (hint) hint.textContent = 'COPIED';
    setTimeout(() => {
      el.classList.remove('copied');
      if (hint) hint.textContent = 'CLICK TO COPY';
    }, 1500);
  });
}

async function submitLink(assignmentId) {
  const input = document.getElementById(`url-${assignmentId}`);
  const url = input.value.trim();
  if (!url) { input.style.borderColor = '#ff3a2f'; return; }

  try {
    const resp = await api(`/clipper/assignments/${assignmentId}/submit`, {
      method: 'PUT',
      body: JSON.stringify({ post_url: url })
    });
    if (resp.ok) {
      loadAssignments();
    } else {
      const data = await resp.json();
      alert(data.detail || 'Failed to submit');
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function previewVideo(url) {
  const modal = document.getElementById('videoModal');
  const video = document.getElementById('modalVideo');
  video.src = url;
  modal.classList.add('active');
  video.play();
}

document.getElementById('videoModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    document.getElementById('modalVideo').pause();
    document.getElementById('modalVideo').src = '';
    document.getElementById('videoModal').classList.remove('active');
  }
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Enter key on login
document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
